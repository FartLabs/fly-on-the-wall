{{define "notes/form"}}
{{template "base" .}}
{{end}}

{{define "content"}}
<div class="notes-form-page">
    <div class="page-header">
        <h2>New Note</h2>
        <a href="/notes" class="btn btn-secondary">Back to Notes</a>
    </div>

    {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/notes" class="note-form">
        <div class="form-group">
            <label for="filename">Filename</label>
            <input type="text" id="filename" name="filename" value="" placeholder="Enter filename..." autocomplete="off">
        </div>

        <div class="form-group">
            <label for="transcription">Transcription</label>
            <textarea id="transcription" name="transcription" rows="12" placeholder="Enter transcription text..."></textarea>
        </div>

        <div class="form-group">
            <label for="summary">Summary</label>
            <textarea id="summary" name="summary" rows="6" placeholder="Enter summary text..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Note</button>
            <a href="/notes" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{{end}}
