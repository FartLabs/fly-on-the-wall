{{define "base"}}<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}} — Fly on the Wall</title>
    {{if .Description}}
    <meta name="description" content="{{.Description}}" />
    {{else}}
    <meta name="description" content="An open-source, local-first AI tool for recording, transcribing, and summarizing meetings." />
    {{end}}

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{.URL}}" />
    <meta property="og:title" content="{{.Title}} — Fly on the Wall" />
    <meta property="og:description" content="{{if .Description}}{{.Description}}{{else}}An open-source, local-first AI tool for recording, transcribing, and summarizing meetings.{{end}}" />
    <meta property="og:image" content="{{if .OGImage}}{{.OGImage}}{{else}}/static/img/og-image.png{{end}}" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="{{.URL}}" />
    <meta property="twitter:title" content="{{.Title}} — Fly on the Wall" />
    <meta property="twitter:description" content="{{if .Description}}{{.Description}}{{else}}An open-source, local-first AI tool for recording, transcribing, and summarizing meetings.{{end}}" />
    <meta property="twitter:image" content="{{if .OGImage}}{{.OGImage}}{{else}}/static/img/og-image.png{{end}}" />

    <link rel="stylesheet" href="/static/css/main.css" />
  </head>
  <body>
    {{template "nav" .}}
    <main class="container">
      {{if .Error}}
      <div class="alert alert-error">{{.Error}}</div>
      {{end}} {{if .Success}}
      <div class="alert alert-success">{{.Success}}</div>
      {{end}} {{template "content" .}}
    </main>
    <footer class="footer">
      <div class="container">
        <p>&copy; {{CurrentYear}} Fly on the Wall</p>
      </div>
    </footer>
  </body>
</html>
{{end}}
