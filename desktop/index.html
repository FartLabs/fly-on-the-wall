<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Fly on the Wall</title>
  </head>
  <body>
    <div class="container">
      <h1>🎙️ Fly on the Wall</h1>
      <p class="subtitle">Meeting Recorder</p>
      
      <div class="recorder-card">
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot"></span>
          <span class="status-text" id="statusText">Ready to record</span>
        </div>
        
        <div class="timer" id="timer">00:00:00</div>
        
        <button class="record-btn" id="recordBtn">
          <span class="btn-icon" id="btnIcon">⏺</span>
          <span class="btn-text" id="btnText">Start Recording</span>
        </button>
      </div>
      
      <div class="audio-devices-card">
        <div class="card-header">
          <h2>🔊 Audio Sources</h2>
          <button class="refresh-btn" id="refreshDevices" title="Refresh devices">↻</button>
        </div>
        
        <div class="system-audio-section">
          <div class="device-item system-audio" id="systemAudioItem">
            <div class="device-info">
              <span class="device-icon">🖥️</span>
              <div class="device-details">
                <div class="device-name">System Audio</div>
                <div class="device-type">Desktop / Meeting Audio</div>
              </div>
            </div>
            <label class="mute-toggle" title="Enable system audio">
              <input type="checkbox" id="systemAudioToggle" checked>
              <span class="mute-slider"></span>
            </label>
          </div>
        </div>
        
        <div class="section-divider">Microphones (Optional)</div>
        
        <div class="devices-list" id="devicesList">
          <p class="loading-text">Loading audio devices...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
